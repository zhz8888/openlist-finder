name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
          - platform: 'windows-latest'
            target: 'aarch64-pc-windows-msvc'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'ubuntu-22.04'
            target: 'aarch64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        id: install-deps
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Install cross-compilation tools (Linux arm64)
        id: install-cross
        if: matrix.platform == 'ubuntu-22.04' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Rust stable
        id: setup-rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Bun
        id: install-bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        id: install-deps-front
        run: bun install

      - name: Build Tauri app
        id: cargo-build
        shell: bash
        env:
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.target }}
        run: |
          # 开发构建: 禁用 updater artifacts (不需要签名密钥)
          echo '{"bundle":{"createUpdaterArtifacts":false}}' > /tmp/dev-build.json

          ARGS=(bunx tauri build --ci --config /tmp/dev-build.json)

          if [ -n "${{ matrix.tauri_args }}" ]; then
            ARGS+=(${{ matrix.tauri_args }})
          fi

          "${ARGS[@]}"

      - name: Collect artifacts
        id: collect
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          FALLBACK_DIR="src-tauri/target/release/bundle"

          # 优先使用带 target 的路径
          if [ -d "$BUNDLE_DIR" ]; then
            SEARCH_DIR="$BUNDLE_DIR"
          else
            SEARCH_DIR="$FALLBACK_DIR"
          fi

          STAGING="build-artifacts/ci-${{ github.sha }}-${{ matrix.platform }}-${{ matrix.target }}"
          mkdir -p "$STAGING"

          echo "Searching for artifacts in: $SEARCH_DIR"
          if [ -d "$SEARCH_DIR" ]; then
            find "$SEARCH_DIR" \
              \( -type f \( \
                -name "*.dmg" -o -name "*.msi" -o \
                -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.zip" \
              \) \) -o \
              \( -type d -name "*.app" \) | while read -r f; do
              base="$(basename "$f")"
              bundle="artifact"
              ext=""

              case "$base" in
                *.app)
                  bundle="app"
                  ext=".app"
                  ;;
                *.dmg)
                  bundle="dmg"
                  ext=".dmg"
                  ;;
                *.msi)
                  bundle="msi"
                  ext=".msi"
                  ;;
                *.deb)
                  bundle="deb"
                  ext=".deb"
                  ;;
                *.rpm)
                  bundle="rpm"
                  ext=".rpm"
                  ;;
                *.AppImage)
                  bundle="appimage"
                  ext=".AppImage"
                  ;;
                *.zip)
                  bundle="zip"
                  ext=".zip"
                  ;;
                *)
                  ext=""
                  ;;
              esac

              target="${{ matrix.platform }}_${{ matrix.target }}_${bundle}${ext}"
              echo "  Copying: ${base} -> ${target}"
              cp -R "$f" "$STAGING/$target"
            done
          fi

          echo "staging_dir=$STAGING" >> "$GITHUB_OUTPUT"
          echo "=== Collected artifacts ==="
          ls -lh "$STAGING/" 2>/dev/null || echo "(empty)"

      - name: Upload artifacts
        id: upload-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-check-${{ matrix.platform }}-${{ matrix.target }}
          path: ${{ steps.collect.outputs.staging_dir }}
          retention-days: 7
          if-no-files-found: warn

      - name: Generate build summary
        shell: bash
        run: |
          # Function to check step status and format emoji
          status_emoji() {
            if [ "$1" == "success" ]; then echo "✅"
            elif [ "$1" == "skipped" ]; then echo "⏭️"
            else echo "❌"; fi
          }

          status_text() {
            if [ "$1" == "success" ]; then echo "✅ Success"
            elif [ "$1" == "skipped" ]; then echo "⏭️ Skipped"
            else echo "❌ $1"; fi
          }

          # Define all steps
          STEPS="checkout install-deps install-cross setup-node setup-rust install-bun install-deps-front cargo-build upload-artifacts"
          STEP_NAMES="Checkout repository|Install dependencies|Install cross-compilation|Setup Node.js|Install Rust|Install Bun|Install frontend deps|Cargo build|Upload artifacts"

          echo "## CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Info" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Overall Status**: $(status_text '${{ job.status }}')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Steps" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Checkout repository | $(status_emoji '${{ steps.checkout.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Install dependencies | $(status_emoji '${{ steps.install-deps.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Install cross-compilation | $(status_emoji '${{ steps.install-cross.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Setup Node.js 24 | $(status_emoji '${{ steps.setup-node.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Install Rust stable | $(status_emoji '${{ steps.setup-rust.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Install Bun | $(status_emoji '${{ steps.install-bun.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Install frontend dependencies | $(status_emoji '${{ steps.install-deps-front.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Tauri app | $(status_emoji '${{ steps.cargo-build.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Upload artifacts | $(status_emoji '${{ steps.upload-artifacts.outcome }}') |" >> $GITHUB_STEP_SUMMARY

          # Check for failures and show error logs
          FAILED_STEPS=""
          SKIPPED_STEPS=""
          if [ "${{ steps.checkout.outcome }}" != "success" ]; then
            if [ "${{ steps.checkout.outcome }}" == "skipped" ]; then
              SKIPPED_STEPS="${SKIPPED_STEPS}checkout "
            else
              FAILED_STEPS="${FAILED_STEPS}checkout "
            fi
          fi
          if [ "${{ steps.install-deps.outcome }}" != "success" ]; then
            if [ "${{ steps.install-deps.outcome }}" == "skipped" ]; then
              SKIPPED_STEPS="${SKIPPED_STEPS}install-deps "
            else
              FAILED_STEPS="${FAILED_STEPS}install-deps "
            fi
          fi
          if [ "${{ steps.install-cross.outcome }}" != "success" ]; then
            if [ "${{ steps.install-cross.outcome }}" == "skipped" ]; then
              SKIPPED_STEPS="${SKIPPED_STEPS}install-cross "
            else
              FAILED_STEPS="${FAILED_STEPS}install-cross "
            fi
          fi
          if [ "${{ steps.setup-node.outcome }}" != "success" ]; then
            if [ "${{ steps.setup-node.outcome }}" == "skipped" ]; then
              SKIPPED_STEPS="${SKIPPED_STEPS}setup-node "
            else
              FAILED_STEPS="${FAILED_STEPS}setup-node "
            fi
          fi
          if [ "${{ steps.setup-rust.outcome }}" != "success" ]; then
            if [ "${{ steps.setup-rust.outcome }}" == "skipped" ]; then
              SKIPPED_STEPS="${SKIPPED_STEPS}setup-rust "
            else
              FAILED_STEPS="${FAILED_STEPS}setup-rust "
            fi
          fi
          if [ "${{ steps.install-bun.outcome }}" != "success" ]; then
            if [ "${{ steps.install-bun.outcome }}" == "skipped" ]; then
              SKIPPED_STEPS="${SKIPPED_STEPS}install-bun "
            else
              FAILED_STEPS="${FAILED_STEPS}install-bun "
            fi
          fi
          if [ "${{ steps.install-deps-front.outcome }}" != "success" ]; then
            if [ "${{ steps.install-deps-front.outcome }}" == "skipped" ]; then
              SKIPPED_STEPS="${SKIPPED_STEPS}install-deps-front "
            else
              FAILED_STEPS="${FAILED_STEPS}install-deps-front "
            fi
          fi
          if [ "${{ steps.cargo-build.outcome }}" != "success" ]; then
            if [ "${{ steps.cargo-build.outcome }}" == "skipped" ]; then
              SKIPPED_STEPS="${SKIPPED_STEPS}cargo-build "
            else
              FAILED_STEPS="${FAILED_STEPS}cargo-build "
            fi
          fi

          if [ -n "$FAILED_STEPS" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failed Steps" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following steps failed. Check the [build log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/logs) for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for step in $FAILED_STEPS; do
              echo "- \`$step\`" >> $GITHUB_STEP_SUMMARY
            done
          fi

          if [ -n "$SKIPPED_STEPS" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Skipped Steps" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following steps were skipped (not applicable for this platform/target)." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for step in $SKIPPED_STEPS; do
              echo "- \`$step\`" >> $GITHUB_STEP_SUMMARY
            done
          fi
