name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Draft Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            arch: 'arm64'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            arch: 'x64'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            arch: 'x64'
          - platform: 'windows-latest'
            target: 'aarch64-pc-windows-msvc'
            arch: 'arm64'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            arch: 'x64'
          - platform: 'ubuntu-22.04'
            target: 'aarch64-unknown-linux-gnu'
            arch: 'arm64'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install cross-compilation tools (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        run: |
          bun run build:release --target ${{ matrix.target }}

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          EXEC_PATH="src-tauri/target/${{ matrix.target }}/release/openlist-finder"

          if [ -d "$BUNDLE_DIR" ]; then
            echo "Uploading bundle files..."
            find "$BUNDLE_DIR" -type f -name "*" | while read file; do
              echo "Uploading: $file"
              gh release upload "$TAG_NAME" "$file" --clobber || echo "Upload failed for $file"
            done
          elif [ -f "$EXEC_PATH" ]; then
            echo "Uploading executable..."
            if [[ "${{ matrix.platform }}" == *"windows"* ]]; then
              cp "$EXEC_PATH" "openlist-finder-${{ matrix.arch }}.exe"
              gh release upload "$TAG_NAME" "openlist-finder-${{ matrix.arch }}.exe" --clobber
            else
              tar -czf "openlist-finder-${{ matrix.arch }}.tar.gz" -C src-tauri/target/${{ matrix.target }}/release openlist-finder
              gh release upload "$TAG_NAME" "openlist-finder-${{ matrix.arch }}.tar.gz" --clobber
            fi
          else
            echo "Warning: No artifacts found for ${{ matrix.target }}"
          fi

  cleanup:
    needs: [create-release, build]
    if: failure() && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Generate build summary
        run: |
          echo "## Release Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status: FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Release**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Result**: Build failed, draft release deleted" >> $GITHUB_STEP_SUMMARY

      - name: Delete Draft Release
        run: |
          echo "All builds failed, deleting draft release..."
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release delete "$TAG_NAME" --yes || true

  success:
    needs: [create-release, build]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Generate build summary
        run: |
          echo "## Release Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Release**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Result**: All builds completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Target | Architecture | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS-latest | aarch64-apple-darwin | arm64 | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS-latest | x86_64-apple-darwin | x64 | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| windows-latest | x86_64-pc-windows-msvc | x64 | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| windows-latest | aarch64-pc-windows-msvc | arm64 | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| ubuntu-22.04 | x86_64-unknown-linux-gnu | x64 | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| ubuntu-22.04 | aarch64-unknown-linux-gnu | arm64 | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "All build artifacts have been uploaded to the release." >> $GITHUB_STEP_SUMMARY

      - name: Success notification
        run: |
          echo "Release ${{ github.ref_name }} published successfully!"
